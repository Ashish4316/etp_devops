name: Docker Hub Publish

on:
  push:
    branches:
      - main

jobs:
  publish:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Start and Check Docker Compose
        run: docker compose up -d

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and Push Backend Docker image
        run: |
          docker build -t ${{ secrets.DOCKERHUB_USERNAME }}/etp-backend:latest ./backend
          docker push ${{ secrets.DOCKERHUB_USERNAME }}/etp-backend:latest

      - name: Build and Push Frontend Docker image
        run: |
          docker build -t ${{ secrets.DOCKERHUB_USERNAME }}/etp-frontend:latest ./frontend
          docker push ${{ secrets.DOCKERHUB_USERNAME }}/etp-frontend:latest