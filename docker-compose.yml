services:
  frontend:
    build: ./frontend
    ports:
    - "80:80"
    depends_on:
      database:
        condition: service_healthy
  
  backend:
    build: ./backend
    ports:
    - "5000:5000"
    depends_on:
      database:
        condition: service_healthy
  
  database:
    image: mysql:8.0
    environment:
      MYSQL_ROOT_PASSWORD: rootpassword
      MYSQL_DATABASE: ecommerce_db
    ports:
    - "3306:3306"
    healthcheck:
      test: ["CMD","mysqladmin","ping","-h","localhost","-prootpassword"]
      interval: 5s
      timeout: 3s
      retries: 10 
    volumes:
    - mysql_data:/var/lib/mysql
volumes:
  mysql_data:
